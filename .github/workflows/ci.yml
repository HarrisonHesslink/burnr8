name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - name: Type check (fail if errors increase beyond baseline)
        run: |
          output=$(mypy src/burnr8/ --ignore-missing-imports 2>&1) || true
          echo "$output"
          errors=$(echo "$output" | tail -1 | grep -oP '\d+(?= error)' || echo 0)
          echo "mypy found $errors errors (baseline: 47)"
          if [ "$errors" -gt 47 ]; then
            echo "::error::mypy regression: $errors errors (baseline: 47)"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: CVE scan (dependencies only)
        run: pip-audit -r requirements.lock --ignore-vuln CVE-2025-8869 --ignore-vuln CVE-2026-1703
      - name: Install project for dependency verification
        run: pip install "."
      - name: Verify direct dependencies
        run: |
          pip show google-ads | grep -qi "google" || exit 1
          pip show fastmcp | grep -qi "fastmcp\|prefect" || exit 1
          pip show python-dotenv | grep -qi "dotenv" || exit 1
          echo "Direct dependency verification passed"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=burnr8 --cov-report=term-missing
      - run: PYTHONPATH=src python -c "from burnr8.server import mcp; print('Import OK')"

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
