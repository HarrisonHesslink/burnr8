name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-lint-${{ hashFiles('requirements-dev.lock') }}
      - run: uv pip install --system -r requirements-dev.lock && uv pip install --system -e . --no-deps
      - run: ruff check src/ tests/
      - name: Type check (strict)
        run: mypy src/burnr8/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-security-${{ hashFiles('requirements-dev.lock') }}
      - run: uv pip install --system pip-audit "pip-tools>=7.5.0,<8.0.0"
      - name: Verify runtime lockfile is up-to-date
        run: |
          pip-compile pyproject.toml --generate-hashes --output-file=requirements.lock --strip-extras --allow-unsafe --quiet
          git diff --exit-code requirements.lock || { echo "::error::requirements.lock is stale — run: pip-compile pyproject.toml --generate-hashes --output-file=requirements.lock --strip-extras --allow-unsafe"; exit 1; }
      - name: Verify dev lockfile is up-to-date
        run: |
          pip-compile pyproject.toml --extra=dev --generate-hashes --output-file=requirements-dev.lock --strip-extras --allow-unsafe --quiet
          git diff --exit-code requirements-dev.lock || { echo "::error::requirements-dev.lock is stale — run: pip-compile pyproject.toml --extra=dev --generate-hashes --output-file=requirements-dev.lock --strip-extras --allow-unsafe"; exit 1; }
      - name: CVE scan (runtime deps)
        run: pip-audit -r requirements.lock --ignore-vuln CVE-2025-8869 --ignore-vuln CVE-2026-1703
      - name: CVE scan (dev deps)
        run: pip-audit -r requirements-dev.lock --ignore-vuln CVE-2025-8869 --ignore-vuln CVE-2026-1703

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.lock') }}
      - name: Install dependencies
        run: |
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            uv pip install --system -r requirements-dev.lock && uv pip install --system -e . --no-deps
          else
            uv pip install --system -e ".[dev]"
          fi
      - run: pytest tests/ --ignore=tests/integration --cov=burnr8 --cov-report=term-missing
      - run: PYTHONPATH=src python -c "from burnr8.server import mcp; print('Import OK')"

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-integration-${{ hashFiles('requirements-dev.lock') }}
      - run: uv pip install --system -r requirements-dev.lock && uv pip install --system -e . --no-deps
      - name: Run integration tests
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: |
          if [ -z "$GOOGLE_ADS_DEVELOPER_TOKEN" ]; then
            echo "::warning::Skipping integration tests — Google Ads secrets not configured"
            exit 0
          fi
          pytest tests/integration/ -v --tb=short -x

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
