name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.lock') }}
      - run: pip install -r requirements-dev.lock && pip install -e . --no-deps
      - run: ruff check src/ tests/
      - name: Type check (strict)
        run: mypy src/burnr8/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements-dev.lock') }}
      - run: pip install pip-audit "pip-tools>=7.5.0,<8.0.0"
      - name: Verify runtime lockfile is up-to-date
        run: |
          pip-compile pyproject.toml --generate-hashes --output-file=requirements.lock --strip-extras --allow-unsafe --quiet
          git diff --exit-code requirements.lock || { echo "::error::requirements.lock is stale — run: pip-compile pyproject.toml --generate-hashes --output-file=requirements.lock --strip-extras --allow-unsafe"; exit 1; }
      - name: Verify dev lockfile is up-to-date
        run: |
          pip-compile pyproject.toml --extra=dev --generate-hashes --output-file=requirements-dev.lock --strip-extras --allow-unsafe --quiet
          git diff --exit-code requirements-dev.lock || { echo "::error::requirements-dev.lock is stale — run: pip-compile pyproject.toml --extra=dev --generate-hashes --output-file=requirements-dev.lock --strip-extras --allow-unsafe"; exit 1; }
      - name: CVE scan (runtime deps)
        run: pip-audit -r requirements.lock --require-hashes --ignore-vuln CVE-2025-8869 --ignore-vuln CVE-2026-1703
      - name: CVE scan (dev deps)
        run: pip-audit -r requirements-dev.lock --ignore-vuln CVE-2025-8869 --ignore-vuln CVE-2026-1703

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.lock') }}
      - run: pip install -r requirements-dev.lock && pip install -e . --no-deps
      - run: pytest tests/ --cov=burnr8 --cov-report=term-missing
      - run: PYTHONPATH=src python -c "from burnr8.server import mcp; print('Import OK')"

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
