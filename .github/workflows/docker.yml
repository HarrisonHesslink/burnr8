name: Docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI to index new version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pip install pip-audit 2>/dev/null
          for i in $(seq 1 12); do
            if pip index versions burnr8 2>/dev/null | grep -q "$VERSION"; then
              echo "burnr8 $VERSION found on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI to index burnr8 $VERSION (attempt $i/12)..."
            sleep 10
          done
          echo "WARNING: burnr8 $VERSION not found on PyPI after 2 minutes, building anyway"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BURNR8_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/harrisonhesslink/burnr8:latest
            ghcr.io/harrisonhesslink/burnr8:${{ steps.version.outputs.version }}
            harrisonhesslink/burnr8:latest
            harrisonhesslink/burnr8:${{ steps.version.outputs.version }}
