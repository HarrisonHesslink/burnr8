repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --no-unsafe-fixes]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pre-push-ci
        name: pre-push CI (lint + typecheck + tests)
        entry: bash -c '.venv/bin/ruff check src/ tests/ && .venv/bin/mypy src/burnr8/ --ignore-missing-imports && .venv/bin/pytest tests/ -x -q --ignore=tests/integration'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
